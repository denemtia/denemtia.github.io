<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>김파인애플 — 링크 모음</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    /* palette from the character */
    --sky1: #6a9ade;      /* sky blue (bg top) */
    --sky2: #4a7bc4;      /* sky blue (bg bottom) */
    --pine: #f2a83b;      /* pineapple body */
    --pine-dark: #d98c28; /* pineapple shade */
    --leaf: #6b7f2e;      /* crown green */
    --leaf-dark: #4f6120;
    --jersey: #ffc928;    /* jersey yellow */
    --ring: #f5e203;      /* neck ring yellow */
    --navy: #253451;      /* jersey numbers / outline navy */
    --card: rgba(255,255,255,0.94);
    --muted: #6d7a94;
  }

  body {
    font-family: "Pretendard", -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Segoe UI", "Malgun Gothic", sans-serif;
    background: linear-gradient(180deg, var(--sky1) 0%, var(--sky2) 100%);
    color: var(--navy);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 48px 20px 64px;
    overflow-x: hidden;
    position: relative;
  }

  /* soft clouds */
  .cloud {
    position: fixed;
    background: rgba(255,255,255,0.35);
    border-radius: 999px;
    filter: blur(30px);
    pointer-events: none;
    z-index: 0;
  }
  .c1 { width: 320px; height: 90px; top: 8%; left: -80px; }
  .c2 { width: 260px; height: 80px; top: 30%; right: -60px; }
  .c3 { width: 380px; height: 110px; bottom: 10%; left: -100px; opacity: 0.7; }

  .wrap {
    width: 100%;
    max-width: 480px;
    position: relative;
    z-index: 1;
  }

  /* ---- profile ---- */
  .profile { text-align: center; margin-bottom: 34px; }

  .avatar {
    width: 128px; height: 128px;
    margin: 0 auto 16px;
    border-radius: 50%;
    background: #fff;
    border: 4px solid var(--jersey);
    box-shadow: 0 8px 24px rgba(37,52,81,0.35), 0 0 0 4px rgba(255,255,255,0.35);
    overflow: hidden;
    display: flex; align-items: flex-end; justify-content: center;
  }
  .avatar img { width: 100%; height: 100%; display: block; object-fit: cover; }

  h1 {
    font-size: 27px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: #fff;
    text-shadow: 0 2px 10px rgba(37,52,81,0.4);
    margin-bottom: 8px;
  }
  h1 .accent { color: var(--jersey); }

  .bio {
    color: rgba(255,255,255,0.88);
    font-size: 14.5px;
    line-height: 1.6;
    text-shadow: 0 1px 6px rgba(37,52,81,0.3);
  }

  .badge {
    display: inline-flex; align-items: center; gap: 7px;
    margin-top: 14px;
    font-size: 12px; font-weight: 800;
    color: var(--navy);
    background: var(--jersey);
    padding: 6px 14px;
    border-radius: 999px;
    letter-spacing: 0.6px;
    box-shadow: 0 4px 14px rgba(37,52,81,0.3);
  }
  .badge .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #e5493a;
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.35; transform: scale(0.8); }
  }

  /* ---- links ---- */
  .links { display: flex; flex-direction: column; gap: 14px; }

  .link {
    display: flex; align-items: center; gap: 16px;
    background: var(--card);
    border: 2px solid transparent;
    border-radius: 18px;
    padding: 15px 18px;
    text-decoration: none;
    color: var(--navy);
    box-shadow: 0 6px 18px rgba(37,52,81,0.22);
    transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
  }
  .link:hover {
    transform: translateY(-3px);
    border-color: var(--jersey);
    box-shadow: 0 12px 26px rgba(37,52,81,0.3);
  }
  .link:active { transform: translateY(-1px) scale(0.99); }

  .icon {
    width: 46px; height: 46px;
    border-radius: 13px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    color: #fff;
  }
  .icon svg { width: 24px; height: 24px; }

  .meta { flex: 1; min-width: 0; }
  .meta .name { display: block; font-size: 16px; font-weight: 800; margin-bottom: 2px; }
  .meta .handle {
    display: block;
    font-size: 12.5px; color: var(--muted);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .arrow {
    color: #b8c2d6;
    flex-shrink: 0;
    transition: transform 0.18s ease, color 0.18s ease;
  }
  .link:hover .arrow { transform: translateX(4px); color: var(--pine); }

  /* per-brand icon chips */
  .chzzk  .icon { background: #000; overflow: hidden; }
  .insta  .icon { background: linear-gradient(135deg, #f58529, #dd2a7b 55%, #8134af); }
  .xtw    .icon { background: #1b2430; }
  .tiktok .icon { background: #111; }
  .youtube .icon { background: #ff0033; }

  footer {
    margin-top: 40px;
    text-align: center;
    color: rgba(255,255,255,0.75);
    font-size: 12px;
    letter-spacing: 0.3px;
    text-shadow: 0 1px 4px rgba(37,52,81,0.3);
  }
</style>
</head>
